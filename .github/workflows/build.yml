name: Build Debug APK

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── Stage 1: Bootstrap Gradle wrapper ──────────────────────────────
      - name: Set up Gradle 8.7
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Bootstrap Gradle wrapper jar
        run: |
          gradle wrapper --gradle-version 8.7
          chmod +x gradlew

      # ── Stage 2: Download sherpa-onnx native .so libraries ─────────────
      - name: Download sherpa-onnx Android JNI libraries
        run: |
          ASSET_URL=$(curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/k2-fsa/sherpa-onnx/releases/latest \
            | jq -r '[.assets[] | select(.name | ascii_downcase | test("android")) | select(.name | endswith(".tar.bz2")) | .browser_download_url][0]')

          if [ -z "$ASSET_URL" ] || [ "$ASSET_URL" = "null" ]; then
            echo "ERROR: No Android .tar.bz2 asset found in the latest sherpa-onnx release."
            exit 1
          fi

          echo "Downloading: $ASSET_URL"
          curl -fsSL "$ASSET_URL" -o /tmp/sherpa-onnx-android.tar.bz2

          mkdir -p /tmp/sherpa-onnx-extracted
          tar -xjf /tmp/sherpa-onnx-android.tar.bz2 -C /tmp/sherpa-onnx-extracted

          for ABI in arm64-v8a armeabi-v7a x86 x86_64; do
            SRC=$(find /tmp/sherpa-onnx-extracted -type d -name "$ABI" | head -1)
            if [ -n "$SRC" ]; then
              mkdir -p "app/src/main/jniLibs/${ABI}"
              cp "${SRC}"/*.so "app/src/main/jniLibs/${ABI}/"
              echo "Installed for ${ABI}: $(ls app/src/main/jniLibs/${ABI})"
            fi
          done

          echo "jniLibs tree:"
          find app/src/main/jniLibs -name "*.so" | sort

      # ── Build ───────────────────────────────────────────────────────────
      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload Debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk-${{ github.sha }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
